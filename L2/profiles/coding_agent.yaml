# Coding agent profile
# Defines specialization targets for a coding agent built on L0

profile: coding_agent
version: 0.1.0
extends: generalist
description: >
  Profile for an agent that reads, writes, and evolves code
  within L0 governed boundaries.
capabilities:
  - code_reading
  - patch_generation
  - proof_execution
  - evidence_collection
constraints:
  - no_direct_shell
  - no_direct_network
  - no_self_modification
