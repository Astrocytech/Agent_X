name: validate-agent-x

on:
  push:
  pull_request:

jobs:
  prove:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install pyyaml pytest
      - run: make prove-l1
      - run: make prove-all
