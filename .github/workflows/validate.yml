name: validate-agent-x

on:
  push:
  pull_request:

jobs:
  structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements/seed.txt pytest
      - name: Audit repository structure
        run: make audit-structure PYTHON=python
      - name: Collect tests
        run: python -m pytest --collect-only -q
      - name: Run tests
        run: make test-all PYTHON=python
