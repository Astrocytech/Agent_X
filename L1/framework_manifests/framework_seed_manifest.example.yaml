# Framework Seed Manifest — Example / Canonical
# This is the preferred valid example manifest for the framework_seed target.

manifest_version: 1
target_kind: framework
name: framework_seed
purpose: bootstrap framework target for evolving framework artifacts

required_interfaces:
  - plugin_registry
  - evaluator_registry
  - promotion_pipeline
  - evidence_bundle

promotion:
  requires_tests: true
  requires_evidence_bundle: true
  requires_rollback_plan: true

packaging:
  exportable: true
  includes_profile: true
  includes_evaluation_spec: true

rollback:
  supported: true

compatibility:
  agent_x_l0_neutral: true
  no_runtime_self_modification: true
