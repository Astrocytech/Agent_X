# Framework Package Manifest Schema
# Schema for validating framework package manifests.

schema_version: 0.1.0
target_kind: framework

fields:
  id:
    type: string
    required: true
    description: "Unique identifier for the framework package"
  name:
    type: string
    required: true
    description: "Human-readable name"
  version:
    type: string
    required: true
    description: "Semantic version"
  target_kind:
    type: string
    required: true
    enum: [framework]
    description: "Must be 'framework'"
  source_profile:
    type: string
    required: true
    description: "Reference to the source L2 profile"
  created_by:
    type: string
    required: true
    description: "Creator or evaluator identifier"
  created_at:
    type: string
    required: true
    description: "ISO 8601 timestamp"
  purpose:
    type: string
    required: true
    description: "Why this framework package exists"
  non_goals:
    type: list
    required: true
    items: string
    description: "Things this framework explicitly does not do"
  contracts:
    type: object
    required: true
    fields:
      module_registry: { type: string, required: true }
      extension_contract: { type: string, required: true }
      composition_contract: { type: string, required: true }
      evaluator_contract: { type: string, required: true }
      promotion_contract: { type: string, required: true }
      packaging_contract: { type: string, required: true }
      rollback_contract: { type: string, required: true }
      compatibility_contract: { type: string, required: true }
  artifacts:
    type: object
    required: true
    fields:
      profile: { type: string, required: true }
      blueprint: { type: string, required: true }
      tests: { type: string, required: true }
      evaluation_report: { type: string, required: true }
      evidence_report: { type: string, required: true }
      rollback_notes: { type: string, required: true }
      package_files: { type: list, required: true, items: string }
  compatibility:
    type: object
    required: true
    fields:
      agent_x_l0_version: { type: string, required: true }
      agent_x_l1_version: { type: string, required: true }
      required_features: { type: list, required: true, items: string }
      forbidden_features: { type: list, required: true, items: string }
  promotion:
    type: object
    required: true
    fields:
      status:
        type: string
        required: true
        enum:
          - rejected
          - revise
          - experimental_framework_profile
          - exportable_framework_package
          - promoted_framework_package
      evaluator: { type: string, required: true }
      evidence_id: { type: string, required: true }
      rollback_id: { type: string, required: true }
      approved_by_user:
        type: any
        required: true
        enum: [true, false, not_required]
  validation:
    type: object
    required: true
    fields:
      l0_invariants_passed: { type: bool, required: true }
      regression_tests_passed: { type: bool, required: true }
      framework_tests_passed: { type: bool, required: true }
      blocked_reasons: { type: list, required: true, items: string }
