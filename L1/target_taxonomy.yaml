# L1 Target Taxonomy — canonical single source of truth for target-kind values.
# All validators, evaluators, and tests must load from this file.
# Changing this file should change validation behavior across the stack.

schema_version: 1

allowed_target_kinds:
  - agent
  - controller
  - orchestrator
  - framework
  - toolchain
  - runtime
  - ui
  - evaluator

common_required_fields:
  - id
  - name
  - version
  - target_kind
  - purpose
  - constraints
  - evaluation

target_kinds:
  agent:
    description: "A runtime actor that plans and acts through governed turns."
    extra_required_fields: []

  controller:
    description: "A coordinator that manages agents, tools, workflows, or runtimes."
    extra_required_fields: []

  orchestrator:
    description: "A multi-agent or multi-tool coordination system."
    extra_required_fields: []

  framework:
    description: "A reusable system for creating, evaluating, composing, evolving, deploying, or governing other artifacts."
    extra_required_fields:
      - non_goals
      - required_capabilities
      - required_interfaces
      - promotion
      - packaging
      - rollback
      - compatibility

  toolchain:
    description: "A set of tools that work together to support development or operations."
    extra_required_fields: []

  runtime:
    description: "An execution environment for running agents, controllers, or frameworks."
    extra_required_fields: []

  ui:
    description: "A user interface for interacting with Agent X components."
    extra_required_fields: []

  evaluator:
    description: "A system that evaluates, benchmarks, or scores other artifacts."
    extra_required_fields: []

framework:
  required_capabilities:
    - plugin_registry
    - extension_boundary
    - evaluation_surface
    - governance_hooks
    - promotion_rules
    - packaging_export
    - rollback_plan

  forbidden_capabilities:
    - l0_runtime_self_modification
    - ungoverned_tool_execution
    - hidden_non_replayable_state
    - required_separate_framework_seed_repo

  required_manifest_fields:
    - id
    - name
    - version
    - target_kind
    - source_profile
    - purpose
    - contracts
    - artifacts
    - compatibility
    - promotion
    - validation

migration:
  missing_target_kind_default: agent
  allow_legacy_profiles_without_target_kind: true
  rule: "Existing profiles without target_kind default to agent for backward compatibility. New profiles must declare target_kind explicitly."
