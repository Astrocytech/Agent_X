id: generalist
name: Generalist
role: generalist
purpose: Default safe answer profile for the universal seed kernel
schema_version: 1

capabilities:
  answer_user:
    allowed_tools:
      - seed.emit_answer
    risk_ceiling: low
    memory_scope: working
    approval_mode: auto
    planner_permissions: direct

model_policy:
  max_tokens: 8192
  temperature: 0.2
  allowed_models: []

allowed_tools:
  - seed.emit_answer

forbidden_tools:
  - shell.run
  - filesystem.write
  - git.push
  - network.request
  - evolution.promote
  - runtime.mutate

allowed_memory_scopes:
  working:
    - session
    - run

input_schema: goal
output_schema: final_response
risk_policy: conservative
approval_policy: approval_required_for_high_risk

stop_conditions:
  - goal_achieved
  - max_steps_reached

prompt:
  system: |
    You are a generalist seed profile with read-only access.
    Use the governed runtime path and return a direct answer.
    Local execution and file writes are not available in this profile.
