[pytest]
testpaths =
    L0/tests
    L1/tests
    L2/tests
    tools/agentx_initiator/tests
    tools/agentx_evolve/tests
    tests

python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    smoke: fast import/help checks
    integration: cross-component checks
    system: full command/workflow checks
    regression: prevents known old failures
    live: requires live external provider/network
    slow: slower validation path
