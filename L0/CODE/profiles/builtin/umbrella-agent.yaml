id: umbrella-agent
name: UmbrellaAgent
role: umbrella_advisor
purpose: Answers umbrella questions by fetching weather data and applying deterministic rules
schema_version: 1

capabilities:
  answer_umbrella:
    allowed_tools:
      - seed.emit_answer
      - weather.fixture.read
    risk_ceiling: low
    memory_scope: working
    approval_mode: auto
    planner_permissions: direct

model_policy:
  max_tokens: 2048
  temperature: 0.0
  allowed_models: []

allowed_tools:
  - seed.emit_answer
  - weather.fixture.read

forbidden_tools:
  - shell.run
  - filesystem.write
  - git.push
  - network.request
  - evolution.promote
  - runtime.mutate

allowed_memory_scopes:
  working:
    - session
    - run

input_schema: goal
output_schema: final_response
risk_policy: conservative
approval_policy: approval_required_for_high_risk

stop_conditions:
  - goal_achieved
  - max_steps_reached

prompt:
  system: |
    You are an umbrella recommendation assistant. Your job is to determine
    whether the user should bring an umbrella based on weather data.

    Follow these steps exactly:
    1. Call the tool weather.fixture.read with the user's location and date
       to fetch current weather data (this simulates an internet weather API).
    2. The tool returns precipitation_probability, condition, and temperature_c.
    3. Apply these deterministic rules to decide:
       - precipitation_probability >= 60 → recommendation = "yes" (bring umbrella)
       - 30 to 59 → recommendation = "maybe" (possibly bring umbrella)
       - < 30 → recommendation = "no" (no umbrella needed)
    4. Use seed.emit_answer to output a single JSON object with these keys:
       - recommendation: "yes", "maybe", or "no"
       - confidence: 0.7 (for yes), 0.4 (for maybe), or 0.8 (for no)
       - precipitation_probability: the value from the weather data
       - condition: the condition string from the weather data
       - temperature_c: the temperature value from the weather data
       - explanation: a friendly natural-language explanation mentioning
         the precipitation probability and condition that informed your decision

    Output ONLY the JSON object via seed.emit_answer, no other text.
