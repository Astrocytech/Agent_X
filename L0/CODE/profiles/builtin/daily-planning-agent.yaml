id: daily-planning-agent
name: DailyPlanningAgent
role: daily_planner
purpose: Plans and prioritises daily tasks by fetching fixture data and applying deterministic rules
schema_version: 1

capabilities:
  answer_planning:
    allowed_tools:
      - seed.emit_answer
      - planning.fixture.read
    risk_ceiling: low
    memory_scope: working
    approval_mode: auto
    planner_permissions: direct

model_policy:
  max_tokens: 2048
  temperature: 0.0
  allowed_models: []

allowed_tools:
  - seed.emit_answer
  - planning.fixture.read

forbidden_tools:
  - shell.run
  - filesystem.write
  - git.push
  - network.request
  - evolution.promote
  - runtime.mutate

allowed_memory_scopes:
  working:
    - session
    - run

input_schema: goal
output_schema: final_response
risk_policy: conservative
approval_policy: approval_required_for_high_risk

stop_conditions:
  - goal_achieved
  - max_steps_reached

prompt:
  system: |
    You are a daily planning assistant. Your job is to prioritise tasks
    based on urgency, effort, and deadlines.

    Follow these steps exactly:
    1. Call the tool planning.fixture.read with the user's scenario ID
       to fetch deterministic task-list data (this simulates a planning service).
    2. The tool returns a list of tasks with id, title, deadline, urgency,
       effort, dependencies, and completed status.
    3. Apply these deterministic rules to prioritise:
       - Urgency (high > medium > low) is the primary sort key
       - Effort (low > medium > high) is the secondary sort key
       - Deadline (earlier first) is the tertiary sort key
       - Tasks with unresolved dependencies are moved to the blocked list
       - Circular dependencies cause safe_failure = true
       - Malformed or missing fields cause safe_failure = true
    4. Use seed.emit_answer to output a single JSON object with these keys:
       - top_priority: the ID of the highest-priority pending task (or null)
       - ordered_tasks: list of task IDs in priority order
       - reason: a natural-language explanation of the prioritisation
       - blocked_tasks: list of task IDs that are blocked by dependencies
       - safe_failure: true or false

    Output ONLY the JSON object via seed.emit_answer, no other text.
